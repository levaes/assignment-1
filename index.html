<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <!-- Google Fonts - Nunito for rounded, bubbly typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS RESET & BASE STYLES
           Ensures consistent styling across all browsers
           ============================================ */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        /* ============================================
           BODY & CONTAINER STYLES
           Sets up the page background with a soft gradient
           and the main content container
           ============================================ */
        body { 
            /* Nunito font - rounded and bubbly */
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; 
            /* Soft pastel gradient background - lavender to soft pink */
            background: linear-gradient(135deg, #E8D5E8 0%, #F5E6D3 50%, #E8E5D5 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* ============================================
           HEADING STYLES
           Title and section headers with soft colors
           ============================================ */
        h1 { 
            text-align: center; 
            /* Deeper lavender text for better contrast */
            color: #6B5B6B; 
            margin-bottom: 30px; 
            font-size: 2.5rem; 
            text-shadow: 2px 2px 4px rgba(107, 91, 107, 0.15); 
        }
        
        h2, h3 { 
            color: #5B4B5B; 
        }

        /* ============================================
           CARD/CONTAINER STYLES
           White cards with rounded corners and soft shadows
           for the controls, filters, and task sections
           ============================================ */
        .controls, .filter-section, .tasks-container { 
            /* Soft white background with rounded corners */
            background: #FFFDF9; 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 20px; 
            /* Gentle pastel shadow */
            box-shadow: 0 8px 30px rgba(180, 160, 180, 0.15); 
        }

        /* ============================================
           FORM CONTROL ROW STYLES
           Layout for grouping form inputs and buttons
           ============================================ */
        .control-row { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 15px; 
            flex-wrap: wrap; 
        }
        .control-row:last-child { 
            margin-bottom: 0; 
        }

        /* ============================================
           INPUT, SELECT, TEXTAREA STYLES
           Form fields with soft borders and focus states
           in pastel lavender tones
           ============================================ */
        input, select, textarea { 
            padding: 14px 18px; 
            /* Soft pastel lavender border */
            border: 2px solid #D8D0D8; 
            border-radius: 12px; 
            font-size: 14px; 
            font-family: 'Nunito', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s; 
            background: #FFFDF9;
            /* Darker text for better readability */
            color: #4A3A4A; 
        }
        
        /* Focus state with soft lavender glow */
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: #B4A4B4; 
            box-shadow: 0 0 0 4px rgba(180, 160, 180, 0.2); 
        }
        
        input::placeholder {
            color: #A090A0;
        }
        
        input[type="text"], input[type="date"] { 
            flex: 1; 
            min-width: 150px; 
        }
        
        textarea { 
            width: 100%; 
            min-height: 60px; 
            resize: vertical; 
        }
        
        select { 
            min-width: 120px; 
        }

        /* ============================================
           BUTTON STYLES
           Pastel-colored buttons with rounded corners
           and soft hover/active effects
           ============================================ */
        button { 
            padding: 14px 28px; 
            border: none; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 600; 
            font-family: 'Nunito', sans-serif;
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(180, 160, 180, 0.25); 
        }
        
        button:active { 
            transform: translateY(0); 
        }

        /* Primary button - soft lavender/pink gradient */
        .btn-primary { 
            background: linear-gradient(135deg, #D8C0D8, #E8D0E0); 
            color: #5B4B5B; 
        }
        
        /* Secondary button - soft cream/peach */
        .btn-secondary { 
            background: #F0E8E0; 
            color: #5B4B5B; 
        }
        
        /* Danger button - soft coral/peach (not harsh red) */
        .btn-danger { 
            background: linear-gradient(135deg, #E8C8C8, #F0D0D0); 
            color: #A06060; 
        }
        
        /* Success button - soft mint green */
        .btn-success { 
            background: linear-gradient(135deg, #C8E8D8, #D8E8D8); 
            color: #5B7A6B; 
        }

        /* ============================================
           TASKS HEADER STYLES
           Title bar showing task count with soft badge
           ============================================ */
        .tasks-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        
        /* Soft lavender task count badge */
        .task-count { 
            background: linear-gradient(135deg, #D8C8D8, #E8D8E8); 
            color: #5B4B5B; 
            padding: 8px 18px; 
            border-radius: 25px; 
            font-size: 14px; 
            font-weight: 600;
        }
        
        .task-list { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        /* ============================================
           TASK ITEM STYLES
           Individual task cards with soft backgrounds,
           rounded corners, and colored left borders
           indicating priority
           ============================================ */
        .task-item { 
            /* Very soft cream background */
            background: #FFFDF9; 
            border-radius: 16px; 
            padding: 22px; 
            /* Soft lavender left border */
            border-left: 5px solid #B4A4B4; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        
        .task-item:hover { 
            transform: translateX(5px); 
            box-shadow: 0 6px 25px rgba(180, 160, 180, 0.15); 
        }

        /* Priority indicator colors - soft pastel versions */
        .task-item.priority-high { 
            border-left-color: #D8B4B4;  /* Soft coral */
        }
        .task-item.priority-medium { 
            border-left-color: #D8C8B4;  /* Soft peach */
        }
        .task-item.priority-low { 
            border-left-color: #B4C8B4;  /* Soft mint */
        }

        /* Completed task styling - slightly faded */
        .task-item.status-completed { 
            opacity: 0.75; 
            background: #F8F6F4; 
        }

        /* ============================================
           TASK CONTENT STYLES
           Title, description, and metadata within task items
           ============================================ */
        .task-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 12px; 
        }
        
        .task-title { 
            font-size: 18px; 
            font-weight: 600; 
            color: #4A3A4A; 
        }
        
        .task-item.status-completed .task-title { 
            text-decoration: line-through; 
            color: #8A7A8A; 
        }
        
        .task-actions { 
            display: flex; 
            gap: 8px; 
        }
        
        .task-actions button { 
            padding: 8px 14px; 
            font-size: 12px; 
        }
        
        .task-description { 
            color: #7A6A7A; 
            margin-bottom: 12px; 
            line-height: 1.6; 
        }
        
        .task-meta { 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap; 
            font-size: 13px; 
            color: #807080; 
        }

        /* ============================================
           TAG & STATUS BADGE STYLES
           Small labels for tags and task status
           with pastel background colors
           ============================================ */
        .tag, .status-badge { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600;
        }
        
        /* Tag - soft lavender */
        .tag { 
            background: #D8C8D8; 
            color: #5B4B5B; 
        }
        
        .status-badge { 
            font-weight: 600; 
        }

        /* Status badges - soft pastel colors */
        .status-pending { 
            background: #E8DCC8; 
            color: #807060; 
        }
        .status-in-progress { 
            background: #D0D8E0; 
            color: #506070; 
        }
        .status-completed { 
            background: #D0E0D8; 
            color: #607060; 
        }

        /* ============================================
           EMPTY STATE STYLES
           Message displayed when no tasks exist
           ============================================ */
        .empty-state { 
            text-align: center; 
            padding: 60px 20px; 
            color: #807080; 
        }
        .empty-state svg { 
            width: 80px; 
            height: 80px; 
            margin-bottom: 20px; 
            opacity: 0.4; 
        }

        /* ============================================
           MODAL/DIALOG STYLES
           Overlay and content for adding/editing tasks
           ============================================ */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            /* Soft semi-transparent overlay */
            background: rgba(160, 140, 160, 0.35); 
            backdrop-filter: blur(4px);
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
        }
        .modal.active { 
            display: flex; 
        }
        .modal-content { 
            background: #FFFDF9; 
            border-radius: 20px; 
            padding: 30px; 
            width: 90%; 
            max-width: 500px; 
            max-height: 90vh; 
            overflow-y: auto; 
            box-shadow: 0 20px 60px rgba(160, 140, 160, 0.35);
        }
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .close-btn { 
            background: none; 
            border: none; 
            font-size: 28px; 
            cursor: pointer; 
            color: #8A7A8A; 
            padding: 0; 
            line-height: 1;
        }
        .close-btn:hover { 
            color: #5B4B5B; 
            transform: none; 
            box-shadow: none; 
        }

        /* ============================================
           FORM GROUP STYLES
           Labels and inputs within the task form
           ============================================ */
        .form-group { 
            margin-bottom: 18px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #5B4B5B; 
        }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; 
        }

        /* ============================================
           TAGS INPUT STYLES
           Container for adding custom tags to tasks
           ============================================ */
        .tags-input-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
            padding: 10px; 
            border: 2px solid #D8D0D8; 
            border-radius: 12px; 
            min-height: 48px; 
            background: #FFFDF9;
        }
        .tags-input-container:focus-within { 
            border-color: #B4A4B4; 
            box-shadow: 0 0 0 4px rgba(180, 160, 180, 0.2); 
        }
        .tag-input { 
            border: none; 
            outline: none; 
            flex: 1; 
            min-width: 100px; 
            padding: 6px; 
            font-size: 14px;
            background: transparent;
        }
        
        /* Individual tag chips */
        .tag-chip { 
            background: #D8C8D8; 
            color: #5B4B5B; 
            padding: 6px 10px; 
            border-radius: 20px; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        .tag-chip button { 
            background: none; 
            border: none; 
            color: #5B4B5B; 
            cursor: pointer; 
            padding: 0; 
            font-size: 16px; 
            line-height: 1; 
            opacity: 0.7;
        }
        .tag-chip button:hover { 
            opacity: 1; 
        }

        /* ============================================
           FEEDBACK MESSAGE STYLES
           Success and error messages with soft colors
           ============================================ */
        .error-message, .success-message { 
            padding: 12px 18px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: none; 
            font-weight: 600;
        }
        .error-message { 
            background: #E8D8D8; 
            color: #A06060; 
        }
        .success-message { 
            background: #D8E8D8; 
            color: #607060; 
        }
        .error-message.visible, .success-message.visible { 
            display: block; 
        }

        /* ============================================
           RESPONSIVE STYLES
           Mobile-friendly layout adjustments
           ============================================ */
        @media (max-width: 768px) {
            .control-row { 
                flex-direction: column; 
            }
            input, select { 
                width: 100%; 
            }
            .task-header { 
                flex-direction: column; 
                gap: 12px; 
            }
            .task-actions { 
                align-self: flex-start; 
            }
        }
    </style>
</head>
<body>
    <!-- ============================================
         MAIN CONTAINER
         Contains all task manager UI elements
         centered on the page
         ============================================ -->
    <div class="container">
        
        <!-- Page Title -->
        <h1>📋 Task Manager</h1>
        
        <!-- ============================================
             CONTROLS SECTION
             Search input and button to add new tasks
             Contains success/error message display area
             ============================================ -->
        <div class="controls">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>
            <div class="control-row">
                <input type="text" id="searchInput" placeholder="Search tasks...">
                <button class="btn-primary" onclick="TaskManager.openModal()">+ Add New Task</button>
            </div>
        </div>
        
        <!-- ============================================
             FILTER SECTION
             Dropdowns and inputs for filtering tasks
             by status, priority, due date, and tags
             ============================================ -->
        <div class="filter-section">
            <h3>🔍 Filter Tasks</h3>
            <div class="control-row">
                <select id="filterStatus">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
                <select id="filterPriority">
                    <option value="">All Priorities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
                <input type="date" id="filterDueDate" placeholder="Filter by due date">
                <input type="text" id="filterTags" placeholder="Filter by tag...">
                <button class="btn-secondary" onclick="TaskManager.clearFilters()">Clear Filters</button>
            </div>
        </div>
        
        <!-- ============================================
             TASKS CONTAINER
             Displays the task list with count header
             Contains either task items or empty state
             ============================================ -->
        <div class="tasks-container">
            <div class="tasks-header">
                <h2>Tasks</h2>
                <span class="task-count" id="taskCount">0 tasks</span>
            </div>
            <div class="task-list" id="taskList"></div>
        </div>
    </div>
    
    <!-- ============================================
         TASK MODAL/DIALOG
         Hidden overlay for adding or editing tasks
         Contains the task form with all input fields
         ============================================ -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-btn" onclick="TaskManager.closeModal()">&times;</button>
            </div>
            <div id="modalError" class="error-message"></div>
            <form id="taskForm" onsubmit="return TaskManager.handleSubmit(event)">
                <!-- Hidden field to store task ID when editing -->
                <input type="hidden" id="taskId">
                
                <!-- Task Title - Required field -->
                <div class="form-group">
                    <label for="taskTitle">Title *</label>
                    <input type="text" id="taskTitle" required placeholder="Enter task title">
                </div>
                
                <!-- Task Description - Optional text area -->
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" placeholder="Enter task description"></textarea>
                </div>
                
                <!-- Task Status - Dropdown selection -->
                <div class="form-group">
                    <label for="taskStatus">Status</label>
                    <select id="taskStatus">
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                
                <!-- Task Priority - Dropdown selection -->
                <div class="form-group">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                
                <!-- Task Due Date - Date picker -->
                <div class="form-group">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                
                <!-- Custom Tags - Input for adding multiple tags -->
                <div class="form-group">
                    <label>Tags</label>
                    <div class="tags-input-container" id="tagsContainer">
                        <input type="text" class="tag-input" id="tagInput" placeholder="Type and press Enter to add tags">
                    </div>
                </div>
                
                <!-- Form Action Buttons -->
                <div class="control-row">
                    <button type="submit" class="btn-success" id="submitBtn">Add Task</button>
                    <button type="button" class="btn-secondary" onclick="TaskManager.closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- ============================================
         JAVASCRIPT FILE
         Contains all task manager functionality
         (CRUD operations, filtering, storage, etc.)
         ============================================ -->
    <script src="task-manager.js"></script>
</body>
</html>
